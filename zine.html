<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINE — DADA POETRY</title>
    <meta name="description" content="Generador d'objecte imprès. Selecciona i imprimeix un zine amb les dades poètiques de l'arxiu.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000000'/><text x='4' y='24' font-family='Courier, monospace' font-size='26' font-weight='bold' fill='%23ffffff'>d_</text></svg>">
    <style>
    @media print {
        @page { margin: 0.75cm; size: A4; }
        body { font-size: 10pt; color: #000; background: #fff; }
        #controls, #controls * { display: none !important; }
        a { text-decoration: none; color: #000; }
        .zine-piece { page-break-before: auto; page-break-inside: avoid; }
        .zine-cover { page-break-after: always; }
        .zine-toc { page-break-after: always; }
        .zine-meta { font-size: 8pt; }
    }

    body {
        background-color: #ffffff;
        color: #000000;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.4;
    }

    hr { border: 0; border-top: 1px solid #000; margin: 20px 0; }
    a { color: #000; font-weight: bold; }
    button {
        background: #000; color: #fff; border: none; padding: 8px 20px;
        cursor: pointer; font-family: monospace; font-size: 1rem;
        margin-right: 10px; margin-bottom: 10px;
    }
    button.secondary { background: #fff; color: #000; border: 1px solid #000; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #controls {
        position: sticky; top: 0; background: #fff; z-index: 10;
        padding: 15px 0; border-bottom: 2px solid #000; margin-bottom: 20px;
    }

    .zine-cover {
        text-align: center;
        padding: 60px 20px;
        border: 2px solid #000;
        margin-bottom: 30px;
    }
    .zine-cover h1 { font-size: 2.5rem; margin: 0; }
    .zine-cover h4 { margin: 30px 0 10px; }
    .zine-cover .issn { font-family: monospace; font-size: 0.85rem; margin-top: 40px; }

    .zine-toc { margin-bottom: 30px; }
    .zine-toc ul { list-style-type: none; padding: 0; }
    .zine-toc li { font-family: monospace; padding: 4px 0; border-bottom: 1px dotted #ccc; }

    .zine-piece {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid #000;
    }
    .zine-piece:last-child { border-bottom: none; }

    .zine-piece h2 { font-size: 1.3rem; margin-bottom: 5px; }
    .zine-piece .author { font-family: monospace; font-size: 0.9rem; margin-top: 0; }

    .zine-piece pre {
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        line-height: 1.3;
        white-space: pre-wrap;
        word-wrap: break-word;
        background: #f9f9f9;
        padding: 10px;
        border-left: 2px solid #000;
    }

    .zine-image {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 10px auto;
        border: 1px solid #000;
    }

    .zine-meta {
        font-family: monospace;
        font-size: 0.75rem;
        color: #555;
        background: #f5f5f5;
        padding: 8px;
        margin-top: 10px;
    }

    .zine-meta table { border-collapse: collapse; width: 100%; }
    .zine-meta td { padding: 2px 8px; vertical-align: top; }
    .zine-meta td:first-child { font-weight: bold; white-space: nowrap; }

    #loading {
        font-family: monospace;
        padding: 40px;
        text-align: center;
        color: #666;
    }

    #error {
        font-family: monospace;
        padding: 20px;
        text-align: center;
        color: #c00;
        border: 1px solid #c00;
        display: none;
    }

    .piece-link { cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" id="back-link">← RETORN AL DIRECTORI</a>

    <div id="controls">
        <h3 style="margin:0 0 10px; display:inline-block;">GENERADOR DE ZINE</h3>
        <button id="print-btn" onclick="window.print()" disabled>IMPRIMIR ZINE</button>
        <button id="select-issue" class="secondary" onclick="selectIssue()">SELECCIONAR NÚMERO</button>
        <span id="status" style="font-family:monospace;font-size:0.85rem;color:#666;margin-left:10px;"></span>
    </div>

    <div id="error"></div>
    <div id="loading">Carregant dades poètiques...</div>
    <div id="zine-content" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, get, update, increment } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://dadapoetry-e3301-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentIssueUrl = "primer/numero-001.html";

        window.selectIssue = function() {
            const url = prompt("URL del número (ex: primer/numero-001.html):", currentIssueUrl);
            if (url) {
                currentIssueUrl = url;
                generateZine();
            }
        };

        async function fetchText(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error("No s'ha pogut carregar: " + url);
            return await res.text();
        }

        async function generateZine() {
            const loading = document.getElementById("loading");
            const content = document.getElementById("zine-content");
            const error = document.getElementById("error");
            const printBtn = document.getElementById("print-btn");
            const status = document.getElementById("status");

            loading.style.display = "block";
            content.style.display = "none";
            error.style.display = "none";
            printBtn.disabled = true;
            status.innerText = "Processant...";

            try {
                const baseUrl = new URL(currentIssueUrl, window.location.href);

                const issueHtml = await fetchText(baseUrl.href);
                const parser = new DOMParser();
                const doc = parser.parseFromString(issueHtml, "text/html");

                const title = doc.querySelector("h2")?.textContent?.trim() || "Objecte de dades";
                const issueDate = doc.querySelector("header span[style]")?.textContent?.trim() || "";
                const issueImg = doc.querySelector("header img");
                const issueImgSrc = issueImg ? issueImg.getAttribute("src") : null;
                const issueCaption = doc.querySelector("header center")?.textContent?.trim() || "";

                const pieceLinks = doc.querySelectorAll(".piece-link");
                const pieces = [];

                for (const link of pieceLinks) {
                    const href = link.getAttribute("href");
                    const pieceTitle = link.textContent.trim();
                    const authorEl = link.parentNode.querySelector("a[href^='#']");
                    const author = authorEl ? authorEl.textContent.trim() : "Anònim";
                    const pieceUrl = new URL(href, baseUrl);

                    try {
                        const pieceHtml = await fetchText(pieceUrl.href);
                        const pieceDoc = parser.parseFromString(pieceHtml, "text/html");
                        const pieceBody = pieceDoc.querySelector("main") || pieceDoc.querySelector("body");

                        const preBlocks = pieceBody ? pieceBody.querySelectorAll("pre") : [];
                        let bodyText = pieceBody ? pieceBody.innerHTML : "";
                        let metaBlock = "";
                        let metaAuthor = "";

                        for (const pre of preBlocks) {
                            const text = pre.textContent;
                            if (text.includes("nom_arxiu_enviat") || text.includes("bateria_dispositiu")) {
                                metaBlock += pre.outerHTML + "\n";
                            }
                        }

                        const images = pieceBody ? pieceBody.querySelectorAll("img") : [];
                        let imageHtml = "";
                        for (const img of images) {
                            if (img.closest("header") || img.closest("footer")) continue;
                            const src = img.getAttribute("src");
                            if (src) {
                                const imgUrl = new URL(src, pieceUrl);
                                imageHtml += `<img class="zine-image" src="${imgUrl.href}" alt="${img.getAttribute('alt') || ''}">\n`;
                            }
                        }

                        const audioLinks = pieceBody ? pieceBody.querySelectorAll("a[href$='.mp3'], a[href$='.m4a'], a[href$='.wav']") : [];
                        let audioHtml = "";
                        for (const a of audioLinks) {
                            const audioUrl = new URL(a.getAttribute("href"), pieceUrl);
                            audioHtml += `<p><a href="${audioUrl.href}" target="_blank">🎧 Escoltar: ${a.textContent}</a></p>\n`;
                        }

                        pieces.push({
                            title: pieceTitle,
                            author,
                            body: bodyText,
                            text: pieceBody ? pieceBody.textContent.substring(0, 200) : "",
                            html: bodyText,
                            meta: metaBlock,
                            image: imageHtml,
                            audio: audioHtml,
                            url: pieceUrl.href
                        });
                    } catch (e) {
                        pieces.push({
                            title: pieceTitle,
                            author,
                            body: "",
                            text: "",
                            html: "",
                            meta: "",
                            image: "",
                            audio: "",
                            url: pieceUrl.href,
                            error: true
                        });
                    }
                }

                const metadataSections = doc.querySelectorAll("main pre");
                let allMetadata = "";
                for (const pre of metadataSections) {
                    allMetadata += pre.outerHTML + "\n";
                }

                renderZine(title, issueDate, issueImgSrc, issueCaption, pieces, allMetadata);

                const docRef = ref(db, "metriques/zine_generat");
                update(docRef, { generacions: increment(1) }).catch(() => {});

                loading.style.display = "none";
                content.style.display = "block";
                printBtn.disabled = false;
                status.innerText = pieces.length + " peces carregades";
            } catch (e) {
                loading.style.display = "none";
                error.style.display = "block";
                error.innerHTML = "<b>ERROR:</b> " + e.message + "<br><br><button class='secondary' onclick='selectIssue()'>PROVAR UN ALTRE NÚMERO</button>";
                status.innerText = "Error";
            }
        }

        function renderZine(title, date, imgSrc, caption, pieces, metadata) {
            const content = document.getElementById("zine-content");
            let html = "";

            html += `<div class="zine-cover">
                <h4>DADA POETRY</h4>
                <h1>${title}</h1>
                ${date ? `<p style="font-family:monospace;">${date}</p>` : ""}
                ${imgSrc ? `<img src="${imgSrc}" style="max-width:200px;margin:20px auto;display:block;border:1px solid #000;">` : ""}
                ${caption ? `<p style="font-style:italic;">${caption}</p>` : ""}
                <p class="issn">Arxiu de dades poètiques i experiments visuals<br>ISSN: 3137-6738</p>
            </div>`;

            html += `<div class="zine-toc">
                <h3>TAULA DE DADES</h3>
                <ul>`;
            for (const piece of pieces) {
                const statusIcon = piece.error ? " [ERROR]" : "";
                html += `<li><strong>${piece.title}</strong> — ${piece.author}${statusIcon}</li>`;
            }
            html += `</ul></div>`;

            for (const piece of pieces) {
                html += `<div class="zine-piece">
                    <h2>${piece.title}</h2>
                    <p class="author">${piece.author}</p>`;

                if (piece.error) {
                    html += `<p style="color:#c00;font-family:monospace;">AQUEST DADA NO HA POGUT SER CARREGAT</p>`;
                    if (piece.url) {
                        html += `<p><a href="${piece.url}" target="_blank">Obrir original →</a></p>`;
                    }
                } else {
                    if (piece.body) {
                        const tempDiv = document.createElement("div");
                        tempDiv.innerHTML = piece.body;

                        const textContent = tempDiv.textContent || tempDiv.innerText || "";
                        const lines = textContent.split("\n").filter(l => l.trim());

                        let textualBody = "";
                        for (const line of lines) {
                            if (line.includes("├─") || line.includes("└─") || line.includes("│")) continue;
                            textualBody += line + "\n";
                        }

                        if (textualBody.trim()) {
                            html += `<pre>${textualBody.trim()}</pre>`;
                        }
                    }

                    html += piece.image || "";
                    html += piece.audio || "";

                    if (piece.meta) {
                        html += `<div class="zine-meta">${piece.meta}</div>`;
                    }
                }

                html += `</div>`;
            }

            if (metadata) {
                html += `<hr><h3>METADADES COMPLETES</h3><div class="zine-meta">${metadata}</div>`;
            }

            html += `<hr><p style="font-family:monospace;font-size:0.85rem;color:#666;text-align:center;">
                Generat per Dada Poetry · ISSN: 3137-6738 · Codi obert</p>`;

            content.innerHTML = html;
        }

        generateZine();
    </script>
</body>
</html>
